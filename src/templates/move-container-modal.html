{# Move a container modal — pick a destination storage unit for an existing container #}
<div class='modal fade' id='moveStorageModal' tabindex='-1' role='dialog' aria-labelledby='moveStorageModalLabel' data-container-id=''>
  <div class='modal-dialog modal-lg' role='document'>
    <div class='modal-content'>
      <div class='modal-header'>
        <h4 class='modal-title' id='moveStorageModalLabel'><i class='fas fa-fw fa-warehouse'></i> {{ 'Move container'|trans }}</h4>
        <button type='button' class='close' data-dismiss='modal' aria-label='{{ 'Close'|trans }}'>
          <span aria-hidden='true'>&times;</span>
        </button>
      </div>
      <div class='modal-body'>
        <div class='mb-2'>
          <h5>{{ 'Pick a new storage location'|trans }}</h5>
          {% include 'storage-list.html' with {'storage_editable': false, 'is_entity': true, 'is_move': true} %}
        </div>
      </div>
      <div class='modal-footer'>
        <button type='button' class='btn btn-secondary' data-dismiss='modal'>{{ 'Close'|trans }}</button>
      </div>
    </div>
  </div>
</div>
