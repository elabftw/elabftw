version: 2
updates:
- package-ecosystem: npm
  directory: "/"
  schedule:
    interval: monthly
    day: wednesday
    time: "06:12"
  open-pull-requests-limit: 10
  cooldown:
      default-days: 12
      semver-major-days: 32
      semver-minor-days: 24
      semver-patch-days: 3
- package-ecosystem: composer
  directory: "/"
  schedule:
    interval: monthly
    day: wednesday
    time: "06:12"
  open-pull-requests-limit: 10
  cooldown:
