networks:
  default:
    name: elabftw-net
services:
  web:
    image: elabtmp
    user: 1000:1000
    build:
      context: ../..
      dockerfile: ./containers/elabtmp/Dockerfile
    container_name: elabtmp
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - FOWNER
      - DAC_OVERRIDE
    environment:
      - DB_HOST=mysqltmp
      - DB_NAME=phpunit
      - DB_USER=phpunit
      # oMg tHe sOuRcE CoDe cOnTaInS PaSsWoRdS In pLaIn tExT!!!
      - DB_PASSWORD=phpunit
      - SECRET_KEY=def00000195a92432f2ebb86bf6e9b9646b45ea955cab7b8f2d96ba2259a85c9e09b04647078c425c5392cb631fa3d9816974bbe8e458d61e16f897ef36c0def362458fd
      - SERVER_NAME=elab.local
      - DISABLE_HTTPS=false
      - ENABLE_LETSENCRYPT=false
      - MAX_UPLOAD_SIZE=200M
      - PHP_TIMEZONE=Europe/Paris
      - TZ=Europe/Paris
      - DEV_MODE=true
      - SITE_URL=https://elab.local:3148
      - ELAB_AWS_ACCESS_KEY=yep
      - ELAB_AWS_SECRET_KEY=yop
      - MAX_PHP_MEMORY=512M
    volumes:
      - ../..:/elabftw
    healthcheck:
      test: /etc/nginx/healthcheck.sh
      interval: 10s
      timeout: 5s
      retries: 3
    tmpfs:
      - /run:mode=755,uid=1000,gid=1000,exec,nosuid,nodev
      - /var/cache/nginx:mode=755,uid=1000,gid=1000,exec,nosuid,nodev
      - /var/lib/elabftw/exports:mode=755,uid=1000,gid=1000,noexec,nosuid,nodev
      - /var/lib/elabftw/uploads:mode=755,uid=1000,gid=1000,noexec,nosuid,nodev
